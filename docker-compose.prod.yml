version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    env_file: .env
    ports:
      - "4000:4000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: production
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - api
